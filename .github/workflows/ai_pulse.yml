name: Exos+ Agentic Pulse
on:
  schedule:
    - cron: '0 * * * *' # Berjalan otomatis setiap jam
  workflow_dispatch:      # Bisa dijalankan manual jika Anda ingin

jobs:
  run-ai:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install AI Library
        # Menggunakan pustaka terbaru sesuai anjuran sistem
        run: pip install google-genai
        
      - name: Execute Exos+ Agent
        env:
          # Pastikan ini sesuai dengan nama yang Anda buat di Secrets
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python agents/news_agent.py
