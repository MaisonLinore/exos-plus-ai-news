name: Exos Run

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install google-genai
      - run: python agents/news_agent.py
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
