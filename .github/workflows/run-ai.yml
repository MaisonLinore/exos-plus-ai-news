name: Exos+ AI News Runner

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  run-ai:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-genai

      - name: Run Exos+ Agent
        env:
          GOOGLE_API_KEY: ${{ secrets.AIzaSyCgHYl3G0VA_xrtbTWVPdsRt-zUftN0D8s }}
        run: python agents/news_agent.py
